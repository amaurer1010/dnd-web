{% extends "base.html" %}
{% block title %}Register — D&D 5e Assistant{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-card">
    <h1 class="login-title">⚔ D&D 5e Assistant</h1>
    <p class="login-subtitle">Request an account</p>

    <form method="POST" action="{{ url_for('register') }}" class="login-form">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required />
      </div>
      <div class="field">
        <label for="confirm">Confirm Password</label>
        <input id="confirm" name="confirm" type="password" autocomplete="new-password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Request Account</button>
    </form>

    <p style="text-align:center; margin-top:1rem; font-size:0.85rem; color:var(--text-muted);">
      Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </p>
    <p style="text-align:center; margin-top:0.5rem; font-size:0.82rem; color:var(--text-muted);">
      Your account will be activated by the admin before you can log in.
    </p>
  </div>
</div>
{% endblock %}
